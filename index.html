    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .bg-gradient-radial {
            background-image: radial-gradient(circle at center, var(--tw-gradient-stops));
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .animated-gradient-text {
            background: linear-gradient(270deg,
                    #0f2d5e,
                    #1a4a8a,
                    #2d6bc4,
                    #4d9de0,
                    #2d6bc4,
                    #1a4a8a,
                    #0f2d5e);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
        }

        /* ===== COMING SOON — Letter Reveal ===== */
        @keyframes letterReveal {
            0% {
                opacity: 0;
                transform: translateY(25px) scale(0.85) rotateX(40deg);
                filter: blur(6px);
            }

            60% {
                opacity: 1;
                transform: translateY(-3px) scale(1.03) rotateX(0deg);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0deg);
                filter: blur(0);
            }
        }

        .cs-letter {
            display: inline-block;
            opacity: 0;
            animation: letterReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            position: relative;
        }

        /* ===== Shimmer Sweep (overlay approach) ===== */
        @keyframes shimmerSweep {
            0% {
                left: -50%;
            }

            100% {
                left: 150%;
            }
        }

        .coming-soon-wrapper {
            perspective: 600px;
            position: relative;
            overflow: hidden;
            padding: 8px 16px;
        }

        .coming-soon-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(77, 157, 224, 0.25) 40%,
                    rgba(0, 179, 254, 0.35) 50%,
                    rgba(77, 157, 224, 0.25) 60%,
                    transparent 100%);
            animation: shimmerSweep 3s 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        .coming-soon-text {
            color: #0f2d5e;
        }

        /* ===== Gentle Float ===== */
        @keyframes gentleFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .cs-float {
            animation: gentleFloat 5s 1.5s ease-in-out infinite;
        }

        /* ===== Glow Pulse via text-shadow ===== */
        @keyframes glowText {

            0%,
            100% {
                text-shadow: 0 0 8px rgba(0, 74, 173, 0.0);
            }

            50% {
                text-shadow: 0 0 20px rgba(0, 74, 173, 0.18), 0 0 40px rgba(0, 179, 254, 0.10);
            }
        }

        .coming-soon-text {
            animation: gentleFloat 5s 1.5s ease-in-out infinite, glowText 4s 2s ease-in-out infinite;
        }

        /* Space between COMING and SOON */
        .cs-space {
            display: inline-block;
            width: 0.35em;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&amp;display=swap" rel="stylesheet" />

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased relative">
    <!-- Subtle gradient background element -->

    </div>
    <!-- Main Content Canvas -->

        class="flex-grow flex flex-col items-center justify-center px-gutter relative z-10 py-stack-lg min-h-[calc(100vh-200px)]">

                            style="animation-delay:0.28s">I</span><span class="cs-letter"
                            style="animation-delay:0.34s">N</span><span class="cs-letter"
                            style="animation-delay:0.40s">G</span><span class="cs-space"></span><span class="cs-letter"
                            style="animation-delay:0.55s">S</span><span class="cs-letter"
                            style="animation-delay:0.61s">O</span><span class="cs-letter"
                            style="animation-delay:0.67s">O</span><span class="cs-letter"
                            style="animation-delay:0.73s">N</span>
                    </h2>
                </div>
            </div>
            <div class="w-16 h-px bg-primary/20"></div>
            <!-- Tagline and Mission -->

                <p class="font-body-lg text-body-lg text-on-surface-variant font-light leading-relaxed">
                    SHAKTRIVA delivers end-to-end IoT solutions, professional PCB designing, and embedded system
                    development for modern industries.
                </p>
            </div>
            <!-- CTA Section -->

                <p class="font-label-sm text-label-sm text-outline tracking-widest mb-4 uppercase">

                </p>
                <form id="notify-form" class="flex flex-col md:flex-row gap-4 relative w-full">
                    <input id="email-input"
                        class="w-full bg-white/80 border-outline-variant text-on-surface placeholder:text-outline focus:border-secondary-container focus:ring-1 focus:ring-secondary-container rounded-full px-6 py-4 outline-none transition-all shadow-[0_8px_16px_rgba(0,74,173,0.04)] font-body-md"
                        placeholder="Enter your email address" required="" type="email" />
                    <button id="submit-btn"
                        class="bg-gradient-to-r from-primary-container to-secondary text-white font-label-sm text-label-sm tracking-widest px-8 py-4 rounded-full flex items-center justify-center gap-2 hover:shadow-[0_12px_24px_rgba(0,74,173,0.2)] transition-all duration-300 active:scale-95 group uppercase whitespace-nowrap"
                        type="submit">
                        <span id="btn-text">NOTIFY ME</span>
                        <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform"
                            data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </form>
                <p id="form-message" class="text-sm mt-4 text-center hidden"></p>
            </div>
        </div>
    </main>
    <!-- Footer Component generated from JSON -->
    <footer
        class="bg-[#111111] text-white relative overflow-hidden flex flex-col items-center justify-end pt-10 md:pt-18 pb-0 w-full">

                class="text-[16vw] leading-[0.8] font-bold text-white/[0.2] uppercase tracking-tighter select-none font-['Goldman'] translate-y-[15%]">
                SHAKTRIVA</h3>

    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = "https://fiuogqxujeenphvhjxci.supabase.co";
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpdW9ncXh1amVlbnBodmhqeGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTA4NjMsImV4cCI6MjA5MjMyNjg2M30.tvDGCsCdpYv10-yfOl4SnfINIbCWq7V6wAuDuDOgrQY";
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            const form = document.getElementById('notify-form');
            const emailInput = document.getElementById('email-input');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const formMessage = document.getElementById('form-message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                if (!email) return;

                // Loading state
                btnText.textContent = "SAVING...";
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

                try {
                    const { data, error } = await supabaseClient
                        .from('waitlist')
                        .insert([{ email }]);

                    if (error) {
                        throw error;
                    }

                    // Success
                    form.classList.add('hidden');
                    formMessage.textContent = "Thank you! You've been added to the waitlist.";
                    formMessage.className = "text-sm mt-6 text-center text-primary-container font-bold tracking-widest";
                    formMessage.classList.remove('hidden');

                } catch (error) {
                    console.error("Error inserting email:", error);
                    let msg = "Something went wrong. Please try again.";
                    if (error.code === '23505') {
                        msg = "This email is already on the waitlist!";
                    }
                    formMessage.textContent = msg;
                    formMessage.className = "text-sm mt-4 text-center text-error font-medium";
                    formMessage.classList.remove('hidden');

                    // Reset button
                    btnText.textContent = "NOTIFY ME";
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            });
        });
    </script>
